{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">
                إنشاء حساب جديد
            </h2>
            <p class="mt-2 text-center text-sm text-slate-600">
                أو
                <a href="{{ url_for('login') }}" class="font-medium text-purple-600 hover:text-purple-500 transition">
                    قم بتسجيل الدخول إلى حسابك
                </a>
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('register') }}" method="POST">
            {% if ref_code %}
            <input type="hidden" name="ref_code" value="{{ ref_code }}">
            <div class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-xl text-sm text-center font-bold">
                أنت تسجل عبر رابط دعوة!
            </div>
            {% endif %}
            
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="username" class="sr-only">اسم المستخدم</label>
                    <input id="username" name="username" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="اسم المستخدم">
                </div>
                <div>
                    <label for="email" class="sr-only">البريد الإلكتروني</label>
                    <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="البريد الإلكتروني">
                </div>
                <div>
                    <label for="password" class="sr-only">كلمة المرور</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-500 text-slate-900 focus:outline-none focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm" placeholder="كلمة المرور">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition shadow-md">
                    إنشاء الحساب
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
